<head>

  <title>Ashby ONE · Attendee Lookbook</title>
  <style>
    /* ── Reset ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── Tokens ── */
    :root {
      --purple: #6358f5;
      --purple-light: #8b83f7;
      --navy: #12103a;
      --bg: #ffffff;
      --text-muted: #12103a;
      --dot-size: 1.5px;
    }

    body {
      font-family: TTNormsPro, -apple-system, "system-ui", "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--navy);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 72px 24px 56px;
    }

    .eyebrow {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--purple);
      margin-bottom: 16px;
    }

    header h1 {
      font-family: TTNormsPro, -apple-system, "system-ui", "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      font-size: 40px;
      font-weight: 840;
      font-stretch: 125%;
      font-style: normal;
      font-variation-settings: "slnt" 0;
      line-height: 50px;
      letter-spacing: -1.6px;
      text-transform: uppercase;
      color: rgb(14, 12, 41);
      margin-bottom: 30px;
      -webkit-font-smoothing: antialiased;
    }

    header p {
      font-size: 1rem;
      color: var(--text-muted);
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 40px 28px;
      padding: 0 40px 96px;
    }

    @media (max-width: 480px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 24px 12px;
        padding: 0 16px 64px;
      }
    }

    /* ── Card ── */
    .card {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }

    /* ── Photo ── */
    .photo-wrap {
      width: 100%;
      position: relative;
    }

    .photo {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1.2;
      border-radius: 20px;
      overflow: hidden;
      background-color: rgb(128, 128, 128);
      background-image: radial-gradient(closest-side, rgb(119, 119, 119), rgb(255, 255, 255)),
        linear-gradient(to right top, rgb(153, 153, 153), rgb(187, 187, 187)),
        conic-gradient(rgb(136, 136, 136) 0deg, rgb(136, 136, 136) 0deg),
        var(--img);
      background-blend-mode: multiply, multiply, screen, luminosity;
      background-size: 2px 2px, auto, auto, cover;
      background-position: 0 50%, 0% 0%, 0% 0%, 50% 50%;
      background-repeat: space, repeat, repeat, repeat;
      filter: brightness(1.2) contrast(3) url(#halftone-indigo);
    }


    /* Raw mode: strip filter and blend modes */
    body.raw-mode .photo {
      filter: none;
      background-blend-mode: normal;
      background-image: var(--img);
      background-size: cover;
      background-position: 50% 50%;
      background-repeat: no-repeat;
      background-color: transparent;
    }

    /* ── Hover-reveal original ── */
    .photo-original {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background-image: var(--img);
      background-size: cover;
      background-position: 50% 50%;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 1.2s ease;
      pointer-events: none;
    }

    .photo-wrap.reveal-original .photo-original {
      opacity: 1;
    }

    /* ── Card body ── */
    .card-body {
      padding: 12px 0 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .card-name {
      font-size: .875rem;
      font-weight: 700;
      color: var(--navy);
      line-height: 1.4;
    }

    .card-company {
      font-size: .875rem;
      font-weight: 400;
      color: var(--purple);
      line-height: 1.4;
    }

    .card-title {
      font-size: .875rem;
      font-weight: 400;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 40px 24px 56px;
      border-top: 1px solid rgba(99, 88, 245, .12);
      font-size: .875rem;
      color: var(--text-muted);
    }

    footer a {
      color: var(--purple);
    }
  </style>
</head>

    // ──────────────────────────────────────────────────────────

    // Extract the slug from a LinkedIn URL: /in/bryce-coleman/ → bryce-coleman
    function linkedinSlug(url) {
      return url.replace(/\/$/, '').split('/in/')[1];
    }

    attendees.sort((a, b) => a.name.localeCompare(b.name));

    const grid = document.getElementById('grid');

    function resolveImage(slug, callback) {
      const exts = ['jpg', 'jpeg', 'png', 'webp', 'avif', 'gif', 'heic'];
      function tryNext(i) {
        if (i >= exts.length) { callback(null); return; }
        const img = new Image();
        img.onload = () => callback(img.src);
        img.onerror = () => tryNext(i + 1);
        img.src = `images/${slug}.${exts[i]}`;
      }
      tryNext(0);
    }

    attendees.forEach(({ name, title, company, linkedin }) => {
      const slug = linkedin ? linkedinSlug(linkedin) : null;
      const card = document.createElement(linkedin ? 'a' : 'div');
      card.className = 'card';
      if (linkedin) {
        card.href = linkedin;
        card.target = '_blank';
        card.rel = 'noopener noreferrer';
      }
      card.innerHTML = `
      <div class="photo-wrap">
        <div class="photo"></div>
        <div class="photo-original"></div>
      </div>
      <div class="card-body">
        <div class="card-name">${name}</div>
        <div class="card-company">${company}</div>
        <div class="card-title">${title}</div>
      </div>
    `;
      grid.appendChild(card);

      const photoWrap = card.querySelector('.photo-wrap');
      let hoverTimer = null;

      photoWrap.addEventListener('mouseenter', () => {
        hoverTimer = setTimeout(() => {
          photoWrap.classList.add('reveal-original');
        }, 1000);
      });

      photoWrap.addEventListener('mouseleave', () => {
        clearTimeout(hoverTimer);
        hoverTimer = null;
        photoWrap.classList.remove('reveal-original');
      });

      if (slug) {
        resolveImage(slug, (src) => {
          if (src) {
            photoWrap.style.setProperty('--img', `url('${src}')`);
          } else {
            card.remove();
          }
        });
      } else {
        card.remove();
      }
    });
  </script>
