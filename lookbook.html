<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ashby ONE · Attendee Lookbook</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Tokens ── */
    :root {
      --purple:      #6358f5;
      --purple-light:#8b83f7;
      --navy:        #12103a;
      --bg:          #ffffff;
      --text-muted:  #12103a;
      --dot-size:    1.5px;
    }

    body {
      font-family: TTNormsPro, -apple-system, "system-ui", "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--navy);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 72px 24px 56px;
    }

    .eyebrow {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--purple);
      margin-bottom: 16px;
    }

    header h1 {
      font-family: TTNormsPro, -apple-system, "system-ui", "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      font-size: 40px;
      font-weight: 840;
      font-stretch: 125%;
      font-style: normal;
      font-variation-settings: "slnt" 0;
      line-height: 50px;
      letter-spacing: -1.6px;
      text-transform: uppercase;
      color: rgb(14, 12, 41);
      margin-bottom: 30px;
      -webkit-font-smoothing: antialiased;
    }

    header p {
      font-size: 1rem;
      color: var(--text-muted);
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 40px 28px;
      padding: 0 40px 96px;
    }

    @media (max-width: 480px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 24px 12px;
        padding: 0 16px 64px;
      }
    }

    /* ── Card ── */
    .card {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }

    /* ── Photo ── */
    .photo-wrap {
      width: 100%;
      position: relative;
    }

    .photo {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1.2;
      border-radius: 20px;
      overflow: hidden;
      background-image: var(--img);
      background-size: cover;
      background-position: 50% 50%;
      background-repeat: no-repeat;
    }

    /* ── Card body ── */
    .card-body {
      padding: 12px 0 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .card-name {
      font-size: .875rem;
      font-weight: 700;
      color: var(--navy);
      line-height: 1.4;
    }

    .card-company {
      font-size: .875rem;
      font-weight: 400;
      color: var(--purple);
      line-height: 1.4;
    }

    .card-title {
      font-size: .875rem;
      font-weight: 400;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 40px 24px 56px;
      border-top: 1px solid rgba(99,88,245,.12);
      font-size: .875rem;
      color: var(--text-muted);
    }

    footer a { color: var(--purple); }

  </style>
</head>
<body>


<header>
  <span class="eyebrow">San Francisco · May 7, 2026</span>
  <h1>Attendee<br>Lookbook</h1>
  <p>Get to know the incredible people joining us at Ashby One—from speakers to fellow attendees. Click through to connect and say hi before the big day!</p>
</header>

<main class="grid" id="grid"></main>


<script>
  // ── Attendee data ──────────────────────────────────────────
  // Add / edit entries here. image can be a URL or relative path.
  const attendees = [
    {
      name:     "Casey Firey",
      title:    "Global Talent Strategy & Operations",
      company:  "Zapier",
      linkedin: "https://www.linkedin.com/in/caseyfirey/",
      image:    "https://i.pravatar.cc/600?img=8",
    },
    {
      name:     "Scott Bonneau",
      title:    "VP of Global Talent",
      company:  "Shopify",
      linkedin: "https://www.linkedin.com/in/scottbonneau/",
      image:    "https://a-us.storyblok.com/f/1017310/960x1016/f6444a1e9b/scott-bonneau-shopify.jpeg",
    },
    {
      name:     "Jordan Kim",
      title:    "Director of Talent Acquisition",
      company:  "Figma",
      linkedin: "https://www.linkedin.com/in/jordankim/",
      image:    "https://i.pravatar.cc/600?img=12",
    },
    {
      name:     "Morgan Patel",
      title:    "VP People & Culture",
      company:  "Linear",
      linkedin: "https://www.linkedin.com/in/morganpatel/",
      image:    "https://i.pravatar.cc/600?img=5",
    },
    {
      name:     "Taylor Nguyen",
      title:    "Chief People Officer",
      company:  "Notion",
      linkedin: "https://www.linkedin.com/in/taylornguyen/",
      image:    "https://i.pravatar.cc/600?img=47",
    },
    {
      name: "Phil Dunphie",
      title: "Chief People Officer",
      company: "Notion",
      linkedin: "https://www.linkedin.com/in/taylornguyen/",
      image: "https://i.pravatar.cc/600?img=48",
    }
  ];
  // ──────────────────────────────────────────────────────────


  const grid = document.getElementById('grid');

  attendees.forEach(({ name, title, company, linkedin, image }) => {
    const card = document.createElement('a');
    card.className = 'card';
    card.href = linkedin;
    card.target = '_blank';
    card.rel = 'noopener noreferrer';
    card.innerHTML = `
      <div class="photo-wrap">
        <div class="photo" style="--img: url('${image}')"></div>
      </div>
      <div class="card-body">
        <div class="card-name">${name}</div>
        <div class="card-company">${company}</div>
        <div class="card-title">${title}</div>
      </div>
    `;
    grid.appendChild(card);
  });
</script>

</body>
</html>
