<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ashby ONE · Attendee Lookbook</title>
  <style>
    /* ── Reset ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── Tokens ── */
    :root {
      --purple: #6358f5;
      --purple-light: #8b83f7;
      --navy: #12103a;
      --bg: #ffffff;
      --text-muted: #12103a;
      --dot-size: 1.5px;
    }

    body {
      font-family: TTNormsPro, -apple-system, "system-ui", "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--navy);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 72px 24px 56px;
    }

    .eyebrow {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--purple);
      margin-bottom: 16px;
    }

    header h1 {
    font-family: ui-sans-serif,system-ui,sans-serif,"Apple Color Emoji","Segoe UI Emoji",Segoe UI Symbol,"Noto Color Emoji";
    font-size: 3rem;
    font-weight: 900;
    line-height: 49px;
    text-transform: uppercase;
    -webkit-font-smoothing: antialiased;
    }

    header p {
      font-size: 1rem;
      color: var(--text-muted);
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Search ── */
    .search-wrap {
      max-width: 420px;
      margin: 28px auto 0;
      position: relative;
    }

    .search-wrap svg.search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--purple-light);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 12px 44px 12px 44px;
      font-family: inherit;
      font-size: 15px;
      border: 1.5px solid rgba(99, 88, 245, 0.25);
      border-radius: 12px;
      outline: none;
      color: var(--navy);
      background: #fff;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .search-input::placeholder {
      color: rgba(99, 88, 245, 0.4);
    }

    .search-input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(99, 88, 245, 0.1);
    }

    .search-clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      border: none;
      background: rgba(99, 88, 245, 0.1);
      border-radius: 50%;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      color: var(--purple);
      font-size: 14px;
      line-height: 1;
      transition: background 0.15s ease;
      padding: 0;
    }

    .search-clear:hover {
      background: rgba(99, 88, 245, 0.2);
    }

    .search-clear.visible {
      display: flex;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 24px;
      color: var(--text-muted);
      opacity: 0.5;
      font-size: 15px;
      display: none;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 40px 28px;
      padding: 0 40px 96px;
    }

    @media (max-width: 480px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 24px 12px;
        padding: 0 24px 64px;
      }
    }

    /* ── Card ── */
    .card {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }

    /* ── Photo ── */
    .photo-wrap {
      width: 100%;
      position: relative;
    }

    .photo {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1.2;
      border-radius: 20px;
      overflow: hidden;
      background-color: rgb(128, 128, 128);
      background-image: radial-gradient(closest-side, rgb(119, 119, 119), rgb(255, 255, 255)),
        linear-gradient(to right top, rgb(153, 153, 153), rgb(187, 187, 187)),
        conic-gradient(rgb(136, 136, 136) 0deg, rgb(136, 136, 136) 0deg),
        var(--img);
      background-blend-mode: multiply, multiply, screen, luminosity;
      background-size: 2px 2px, auto, auto, cover;
      background-position: 0 50%, 0% 0%, 0% 0%, 50% 50%;
      background-repeat: space, repeat, repeat, repeat;
      filter: brightness(1.2) contrast(3) url(#halftone-indigo);
    }


    /* Raw mode: strip filter and blend modes */
    body.raw-mode .photo {
      filter: none;
      background-blend-mode: normal;
      background-image: var(--img);
      background-size: cover;
      background-position: 50% 50%;
      background-repeat: no-repeat;
      background-color: transparent;
    }

    /* ── Hover-reveal original ── */
    .photo-original {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background-image: var(--img);
      background-size: cover;
      background-position: 50% 50%;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 1.2s ease;
      pointer-events: none;
    }

    .photo-wrap.reveal-original .photo-original {
      opacity: 1;
    }

    /* ── Speaker badge ── */
    .speaker-badge {
      position: absolute;
      right: 0%;
      bottom: 0%;
      width: 30%;
      height: auto;
      pointer-events: none;
      z-index: 2;
    }

    /* ── Card body ── */
    .card-body {
      padding: 12px 0 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .card-name {
      font-size: .875rem;
      font-weight: 700;
      color: var(--navy);
      line-height: 1.4;
    }

    .card-company {
      font-size: .875rem;
      font-weight: 400;
      color: var(--purple);
      line-height: 1.4;
    }

    .card-title {
      font-size: .875rem;
      font-weight: 400;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* ── Loader ── */
    #loader {
      display: flex;
      justify-content: center;
      padding: 80px 0 120px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(99, 88, 245, .2);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 40px 24px 56px;
      border-top: 1px solid rgba(99, 88, 245, .12);
      font-size: .875rem;
      color: var(--text-muted);
    }

    footer a {
      color: var(--purple);
    }
  </style>
</head>

    // Extract the slug from a LinkedIn URL: /in/bryce-coleman/ → bryce-coleman
    function linkedinSlug(url) {
      return url.replace(/\/$/, '').split('/in/')[1];
    }

    attendees.sort((a, b) => a.name.localeCompare(b.name));

    // Dedupe on name + company (case-insensitive), flag duplicates in console
    {
      const seen = new Map();
      const duplicates = [];
      const deduped = [];
      for (const a of attendees) {
        const key = `${(a.name || '').trim().toLowerCase()}|${(a.company || '').trim().toLowerCase()}`;
        if (seen.has(key)) {
          duplicates.push(a);
        } else {
          seen.set(key, a);
          deduped.push(a);
        }
      }
      if (duplicates.length > 0) {
        console.warn(
          `%c${duplicates.length} duplicate attendee${duplicates.length === 1 ? '' : 's'} removed (same name + company):`,
          'font-weight: bold; color: #d97706; font-size: 14px;'
        );
        duplicates.forEach(d => console.warn(`  · ${d.name} — ${d.company}`));
      }
      attendees.length = 0;
      attendees.push(...deduped);
    }

    console.log(attendees.map(a => a.name).join('\n'));

    const grid = document.getElementById('grid');

    function resolveImage(slug) {
      const exts = ['jpg', 'jpeg', 'png'];
      return new Promise((resolve) => {
        function tryNext(i) {
          if (i >= exts.length) { resolve(null); return; }
          const img = new Image();
          img.onload = () => resolve(img.src);
          img.onerror = () => tryNext(i + 1);
          img.src = `images/${slug}.${exts[i]}`;
        }
        tryNext(0);
      });
    }

    document.getElementById('loader').remove();

    const EAGER_COUNT = 20;
    window.missingProfiles = [];
    window.missingNames = [];
    let totalToProcess = attendees.length;
    let processedCount = 0;
    let summaryPrinted = false;

    function maybePrintSummary() {
      if (summaryPrinted) return;
      if (processedCount < totalToProcess) return;
      summaryPrinted = true;
      if (window.missingProfiles.length === 0) return;
      console.log(
        `%c${window.missingProfiles.length} attendees missing images (names):`,
        'font-weight: bold; color: #dc2626; font-size: 14px;'
      );
      console.log(window.missingNames.join('\n'));
      console.log(
        `%c${window.missingProfiles.length} attendees missing images (LinkedIn URLs):`,
        'font-weight: bold; color: #dc2626; font-size: 14px;'
      );
      console.log(window.missingProfiles.join('\n'));
    }

    // Build a card shell for every attendee up front (preserves alphabetical order)
    const cardRecords = attendees.map(({ name, title, company, linkedin, speaker }) => {
      const slug = linkedin ? linkedinSlug(linkedin) : null;

      const card = document.createElement('a');
      card.className = 'card';
      if (linkedin) {
        card.href = linkedin;
        card.target = '_blank';
        card.rel = 'noopener noreferrer';
      }
      card.innerHTML = `
        <div class="photo-wrap">
          <div class="photo"></div>
          <div class="photo-original"></div>
          ${speaker ? '<img class="speaker-badge" src="images/speaker-badge.png" alt="Speaker" />' : ''}
        </div>
        <div class="card-body">
          <div class="card-name">${name}</div>
          <div class="card-company">${company}</div>
          <div class="card-title">${title}</div>
        </div>
      `;
      grid.appendChild(card);

      return { card, slug, linkedin, name, loaded: false };
    });

    function loadCardImage(record) {
      if (record.loaded) return;
      record.loaded = true;

      if (!record.slug) {
        record.card.remove();
        processedCount++;
        maybePrintSummary();
        return;
      }

      resolveImage(record.slug).then(src => {
        processedCount++;
        if (!src) {
          if (record.linkedin) {
            const slug = record.slug;
            const normalized = `https://www.linkedin.com/in/${slug}/`;
            window.missingProfiles.push(normalized);
            window.missingNames.push(record.name);
            console.warn(`Missing image: ${record.name} — ${normalized}`);
          }
          record.card.remove();
          maybePrintSummary();
          return;
        }

        const photoWrap = record.card.querySelector('.photo-wrap');
        const imgUrl = `url('${src}')`;
        record.card.querySelector('.photo').style.setProperty('--img', imgUrl);
        record.card.querySelector('.photo-original').style.setProperty('--img', imgUrl);

        let hoverTimer = null;
        photoWrap.addEventListener('mouseenter', () => {
          hoverTimer = setTimeout(() => photoWrap.classList.add('reveal-original'), 1000);
        });
        photoWrap.addEventListener('mouseleave', () => {
          clearTimeout(hoverTimer);
          hoverTimer = null;
          photoWrap.classList.remove('reveal-original');
        });

        maybePrintSummary();
      });
    }

    // Eagerly load the first N cards
    cardRecords.slice(0, EAGER_COUNT).forEach(loadCardImage);

    // Lazy load the rest as they approach the viewport
    if ('IntersectionObserver' in window) {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const record = entry.target._record;
            if (record) {
              loadCardImage(record);
              observer.unobserve(entry.target);
            }
          }
        });
      }, { rootMargin: '600px 0px' });

      cardRecords.slice(EAGER_COUNT).forEach(record => {
        record.card._record = record;
        observer.observe(record.card);
      });
    } else {
      // Fallback: just load everything
      cardRecords.slice(EAGER_COUNT).forEach(loadCardImage);
    }

    // ── Search ──────────────────────────────────────────────────
    const searchInput = document.getElementById('search');
    const searchClear = document.getElementById('searchClear');
    const noResults = document.getElementById('noResults');

    // Build a lookup of lowercase searchable text per card
    cardRecords.forEach(record => {
      const el = record.card;
      const name = (el.querySelector('.card-name')?.textContent || '').toLowerCase();
      const company = (el.querySelector('.card-company')?.textContent || '').toLowerCase();
      const title = (el.querySelector('.card-title')?.textContent || '').toLowerCase();
      record.searchText = `${name} ${company} ${title}`;
    });

    let searchTimer = null;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(runSearch, 80);
    });

    function runSearch() {
      const raw = searchInput.value.trim().toLowerCase();
      searchClear.classList.toggle('visible', raw.length > 0);

      if (!raw) {
        // Show all cards that still exist in the DOM
        cardRecords.forEach(r => { r.card.style.display = ''; });
        noResults.style.display = 'none';
        return;
      }

      const terms = raw.split(/\s+/);
      let anyVisible = false;

      cardRecords.forEach(record => {
        const match = terms.every(t => record.searchText.includes(t));
        record.card.style.display = match ? '' : 'none';
        if (match) {
          anyVisible = true;
          loadCardImage(record); // ensure image loads for search hits
        }
      });

      noResults.style.display = anyVisible ? 'none' : 'block';
    }

    searchClear.addEventListener('click', () => {
      clearTimeout(searchTimer);
      searchInput.value = '';
      searchClear.classList.remove('visible');
      cardRecords.forEach(r => { r.card.style.display = ''; });
      noResults.style.display = 'none';
      searchInput.focus();
    });
  </script>
