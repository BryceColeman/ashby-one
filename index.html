<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ashby ONE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #6358f5;
      --navy:   #12103a;
    }

    body {
      font-family: TTNormsPro, -apple-system, "system-ui", "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      background: #ffffff;
      color: var(--navy);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
    }

    .eyebrow {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--purple);
      margin-bottom: 16px;
    }

    h1 {
      font-size: 56px;
      font-weight: 840;
      font-stretch: 125%;
      line-height: 1.1;
      letter-spacing: -2px;
      text-transform: uppercase;
      color: var(--navy);
      margin-bottom: 20px;
      -webkit-font-smoothing: antialiased;
    }

    p {
      font-size: 1rem;
      color: rgba(18,16,58,.6);
      max-width: 440px;
      line-height: 1.65;
    }
  </style>
</head>
<body>
  <span class="eyebrow">San Francisco · May 7, 2026</span>
  <h1>Ashby<br>ONE</h1>
  <p>The premier gathering for talent leaders. Connect, learn, and build the future of hiring together.</p>
</body>
</html>
